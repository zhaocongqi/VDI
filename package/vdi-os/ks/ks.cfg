# VDI kickstart 模板（MVP1 静态无人值守骨架）
#
# 目标：BCLinux DVD ISO + inst.ks 引导，anaconda 按 ks 无人值守装机到整盘，
# 装完重启进 BCLinux 登录。MVP3 起由 %pre 调 vdi-installer TUI 动态生成
# 网络/磁盘/密码段，经 %include 合并进本模板。
#
# 卷标必须与 BCLinux DVD ISO 一致（BCLinux.x86_64），inst.ks/inst.stage2 据此寻址。

# 文本安装器（服务器场景，省内存；图形安装器需更大内存）
# 新版 anaconda（36+）已移除 install/autostep 指令，默认即安装、inst.cmdline 已无人值守
text
# 安装来源：本 ISO 自带的安装树（stage2 = images/install.img）
cdrom
# 键盘与语言
keyboard --vckeymap=us --xlayouts='us'
lang zh_CN.UTF-8
# 时区
timezone Asia/Shanghai --utc
# 网络：首启后由 VDI NetworkManager 配置接管，装机期 DHCP 拿地址即可
network --bootproto=dhcp --device=link --activate
# SELinux：permissive（RKE2 兼容，避免 enforcing 下容器 xattr 限制）
selinux --permissive
# 防火墙：关（K8s 节点由 kube-proxy/NetworkPolicy 管理流量）
firewall --disabled
# 装完自动重启（--eject 弹出 ISO，避免再次引导进安装器）
reboot --eject

# 磁盘：清空目标盘所有分区，自动分区（boot/efi/root）
clearpart --all --initlabel
# autopart：type=lvm 用 LVM 根卷（便于后续扩容），--fstype ext4
autopart --type=lvm --fstype=ext4
# bootloader：append 串口 console，便于 qemu/headless 看启动日志
bootloader --append="console=ttyS0,115200 console=tty1"

# root 密码：构建期由 package-vdi-iso 用 openssl passwd -6 替换占位符为完整哈希
# 注意 BCLinux anaconda 36 下 rootpw --iscrypted 偶发不生效，下方 %post 用 chpasswd 兜底
rootpw --iscrypted ROOTPW_HASH_PLACEHOLDER

# 包：最小 @core + RKE2 运行依赖
# BCLinux 21.10 DVD 仓库缺 container-selinux/conntrack-tools/ipvsadm/socat/iptables-services，
# 这批 RKE2 依赖留 MVP2 从 RKE2 tar.gz 或额外 RPM 补；本处只列仓库内确有的包
%packages
@core
@base
iptables
iproute
ipset
ebtables
net-tools
bind-utils
nfs-utils
policycoreutils-python-utils
-firmware-*
-iwl*-firmware
%end

# %post 阶段1（nochroot）：从 ISO 复制离线 bundle 到目标盘
# anaconda 装机时 ISO 挂在 /run/install/repo，目标盘在 /mnt/sysroot
# %post --nochroot 在安装环境根（非 chroot），两者都可访问
%post --nochroot --interpreter=/bin/bash
set -x
REPO=/run/install/repo
SYSROOT=/mnt/sysroot
BUNDLE=${REPO}/bundle/vdi
mkdir -p ${SYSROOT}/var/lib/rancher/rke2/agent/images
# RKE2 镜像 tar.zst → agent/images/（RKE2 首启自动导入）
cp -f ${BUNDLE}/images/*.tar.zst ${SYSROOT}/var/lib/rancher/rke2/agent/images/ 2>/dev/null || echo "WARN: 无 rke2 images"
# RKE2 二进制 tar.gz → /tmp（chroot 阶段解压到 /usr/local）
cp -f ${BUNDLE}/binaries/rke2.linux-*.tar.gz ${SYSROOT}/tmp/rke2.tar.gz
# Helm charts tgz → server/charts/（HelmChart CRD spec.chart 引用）
mkdir -p ${SYSROOT}/var/lib/rancher/rke2/server/charts
cp -f ${BUNDLE}/charts/*.tgz ${SYSROOT}/var/lib/rancher/rke2/server/charts/ 2>/dev/null || echo "WARN: 无 charts"
sync
%end

# %post 阶段2（chroot）：解压 RKE2 + 写 config + enable
%post --interpreter=/bin/bash
set -x
# 兜底设 root 密码 + sshd 允许 root 登录
echo "root:vdi123" | chpasswd
passwd -u root 2>/dev/null || true
mkdir -p /etc/ssh/sshd_config.d
cat > /etc/ssh/sshd_config.d/00-vdi-root-login.conf <<'SSHD'
PermitRootLogin yes
PasswordAuthentication yes
SSHD
systemctl enable sshd 2>/dev/null || ln -sf /usr/lib/systemd/system/sshd.service /etc/systemd/system/multi-user.target.wants/sshd.service

# 解压 RKE2 二进制到 /usr/local（bin/rke2, lib/systemd/system/rke2-*.service, share/rke2/）
tar xzf /tmp/rke2.tar.gz -C /usr/local
rm -f /tmp/rke2.tar.gz
chmod +x /usr/local/bin/rke2

# RKE2 server config（MVP2 静态单节点；MVP3 由 vdi-installer TUI 动态生成）
# 默认 canal CNI（rke2-images 已含），让 node Ready；组件栈 MVP4 改 cni:none + kube-ovn
mkdir -p /etc/rancher/rke2
cat > /etc/rancher/rke2/config.yaml <<'RKE2'
token: vdi123
disable:
  - rke2-ingress-nginx
RKE2

# enable rke2-server（首节点；加入节点 MVP4 改 rke2-agent + server-url）
systemctl enable rke2-server 2>/dev/null || \
  ln -sf /usr/local/lib/systemd/system/rke2-server.service /etc/systemd/system/multi-user.target.wants/rke2-server.service
%end
