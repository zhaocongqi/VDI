# VDI 平台系统引导安装 Kickstart 模板
#
# BCLinux DVD ISO 引导后会首先进入此脚本。在 %pre 阶段，我们将标准输入输出重定向
# 到 tty1 并启动交互式 vdi-installer（Go-TUI），引导用户进行配置。
# 配置完成后将结果渲染成完整的 /tmp/ks-include.cfg，随后由 %include 彻底接管装机。

%pre --interpreter=/bin/bash
# 调试诊断：将 %pre 脚本全量输出重定向到串口 ttyS0，并开启执行跟踪，便于实时看到每一行命令的执行
exec > /dev/ttyS0 2>&1
set -x

# 1. 确保挂载 ISO 介质以访问 vdi-installer 二进制与离线安装包
ISO_MOUNT="/run/install/repo"
if [ ! -d "${ISO_MOUNT}/vdi" ]; then
    echo "正在尝试挂载 ISO 安装介质..."
    mkdir -p ${ISO_MOUNT}
    mount -t iso9660 -o ro /dev/sr0 ${ISO_MOUNT} || mount -t iso9660 -o ro /dev/cdrom ${ISO_MOUNT} || true
fi

INSTALLER_BIN="${ISO_MOUNT}/vdi/vdi-installer"
ALT_BIN=$(find ${ISO_MOUNT} -name vdi-installer -print -quit)

# 2. 判断是否是全自动化安装模式（从 /proc/cmdline 检测 vdi.install.automatic=true）
if grep -q "vdi.install.automatic=true" /proc/cmdline; then
    echo "检测到自动化安装参数，正在后台静默渲染安装配置..."
    # 在后台直接静默调用 vdi-installer 并将输出重定向到串口以供调试
    # 完全跳过对 /dev/tty1 的重定向以防止设备未就绪卡死
    if [ -x "${INSTALLER_BIN}" ]; then
        "${INSTALLER_BIN}"
    elif [ -n "${ALT_BIN}" ] && [ -x "${ALT_BIN}" ]; then
        "${ALT_BIN}"
    else
        vdi-installer
    fi
else
    # 3. 交互式 TUI 安装模式：重定向输入输出到物理控制台 tty1，以确保交互式 TUI 正常渲染和输入
    # 关闭当前的全局串口重定向，绑定到 tty1 进行 gocui 交互
    exec < /dev/tty1 > /dev/tty1 2>&1
    chvt 1
    clear

    echo "===================================================="
    echo "          欢迎使用 VDI 平台系统安装程序          "
    echo "===================================================="
    echo "正在检测并启动交互式配置控制台，请稍候..."
    echo ""

    if [ -x "${INSTALLER_BIN}" ]; then
        echo "启动配置控制台..."
        "${INSTALLER_BIN}"
    elif [ -n "${ALT_BIN}" ] && [ -x "${ALT_BIN}" ]; then
        echo "在备选路径启动配置控制台..."
        "${ALT_BIN}"
    else
        echo "ERROR: 未在安装介质中找到安装程序 vdi-installer。"
        echo "系统将在 5 秒后回退至默认无人值守模式..."
        sleep 5
    fi
fi

# 4. 兜底保护：如果因未完成交互或环境异常未能生成 ks-include.cfg，则在此利用 --auto-install 生成默认配置
if [ ! -f /tmp/ks-include.cfg ]; then
    echo "未检测到动态安装配置，正在使用默认配置进行兜底安装..."
    if [ -x "${INSTALLER_BIN}" ]; then
        "${INSTALLER_BIN}" --auto-install --ks-out /tmp/ks-include.cfg || true
    elif [ -n "${ALT_BIN}" ] && [ -x "${ALT_BIN}" ]; then
        "${ALT_BIN}" --auto-install --ks-out /tmp/ks-include.cfg || true
    else
        vdi-installer --auto-install --ks-out /tmp/ks-include.cfg || true
    fi
fi

# 确认文件存在
if [ ! -f /tmp/ks-include.cfg ]; then
    echo "ERROR: 无法生成任何 Kickstart 配置段！装机无法继续。"
    exit 1
fi

# 5. 调试诊断：将 vdi-installer 运行日志输出到物理串口，便于无人值守时排查
if [ -f /var/log/console.log ]; then
    echo "--- vdi-installer 日志输出 (ttyS0) ---" > /dev/ttyS0
    cat /var/log/console.log > /dev/ttyS0 || true
    echo "--- vdi-installer 日志输出结束 (ttyS0) ---" > /dev/ttyS0
fi
# 开启后台 systemd 临时日志投递守护服务，规避父进程退出后被 SIGKILL 剿灭的限制
cat > /etc/systemd/system/vdi-log-daemon.service <<'SYSTEMD_SERVICE'
[Unit]
Description=VDI Anaconda Log Daemon to ttyS0
After=local-fs.target

[Service]
Type=simple
ExecStart=/bin/bash -c "while :; do echo \"=== [\$(date '+%%H:%%M:%%S')] 实时日志心跳监控 ===\"; if [ -f /tmp/anaconda.log ]; then echo '--- /tmp/anaconda.log 尾部 ---'; tail -n 35 /tmp/anaconda.log; fi; if [ -f /tmp/storage.log ]; then echo '--- /tmp/storage.log 尾部 ---'; tail -n 35 /tmp/storage.log; fi; sleep 15; done"
StandardOutput=file:/dev/ttyS0
StandardError=file:/dev/ttyS0

[Install]
WantedBy=multi-user.target
SYSTEMD_SERVICE

systemctl daemon-reload
systemctl start vdi-log-daemon.service
echo "--- 已启动后台 systemd 临时日志投递服务 (vdi-log-daemon) ---"

echo "配置收集完成，正在切回安装器界面，接下来将由 Anaconda 接管安装..."
sleep 2
clear
%end

# 全量吸收由 vdi-installer 生成的装机逻辑
%include /tmp/ks-include.cfg
