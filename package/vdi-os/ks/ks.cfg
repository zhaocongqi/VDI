# VDI kickstart 模板（MVP1 静态无人值守骨架）
#
# 目标：BCLinux DVD ISO + inst.ks 引导，anaconda 按 ks 无人值守装机到整盘，
# 装完重启进 BCLinux 登录。MVP3 起由 %pre 调 vdi-installer TUI 动态生成
# 网络/磁盘/密码段，经 %include 合并进本模板。
#
# 卷标必须与 BCLinux DVD ISO 一致（BCLinux.x86_64），inst.ks/inst.stage2 据此寻址。

# 文本安装器（服务器场景，省内存；图形安装器需更大内存）
# 新版 anaconda（36+）已移除 install/autostep 指令，默认即安装、inst.cmdline 已无人值守
text
# 安装来源：本 ISO 自带的安装树（stage2 = images/install.img）
cdrom
# 键盘与语言
keyboard --vckeymap=us --xlayouts='us'
lang zh_CN.UTF-8
# 时区
timezone Asia/Shanghai --utc
# 网络：首启后由 VDI NetworkManager 配置接管，装机期 DHCP 拿地址即可
network --bootproto=dhcp --device=link --activate
# SELinux：permissive（RKE2 兼容，避免 enforcing 下容器 xattr 限制）
selinux --permissive
# 防火墙：关（K8s 节点由 kube-proxy/NetworkPolicy 管理流量）
firewall --disabled
# 装完自动重启（--eject 弹出 ISO，避免再次引导进安装器）
reboot --eject

# 磁盘：清空目标盘所有分区，自动分区（boot/efi/root）
clearpart --all --initlabel
# autopart：type=lvm 用 LVM 根卷（便于后续扩容），--fstype ext4
autopart --type=lvm --fstype=ext4
# bootloader：append 串口 console，便于 qemu/headless 看启动日志
bootloader --append="console=ttyS0,115200 console=tty1"

# root 密码：构建期由 package-vdi-iso 用 openssl passwd -6 替换占位符为完整哈希
# 注意 BCLinux anaconda 36 下 rootpw --iscrypted 偶发不生效，下方 %post 用 chpasswd 兜底
rootpw --iscrypted ROOTPW_HASH_PLACEHOLDER

# 包：最小 @core + RKE2 运行依赖
# BCLinux 21.10 DVD 仓库缺 container-selinux/conntrack-tools/ipvsadm/socat/iptables-services，
# 这批 RKE2 依赖留 MVP2 从 RKE2 tar.gz 或额外 RPM 补；本处只列仓库内确有的包
%packages
@core
@base
iptables
iproute
ipset
ebtables
net-tools
bind-utils
nfs-utils
policycoreutils-python-utils
-firmware-*
-iwl*-firmware
%end

# %post：设 root 密码（兜底 rootpw）+ sshd 允许 root 密码登录
# MVP2 起在此装 RKE2；MVP3 起 %pre 调 vdi-installer TUI 动态生成配置段
%post --interpreter=/bin/bash
# 兜底设 root 密码（anaconda 36 rootpw 偶发不生效）
echo "root:vdi123" | chpasswd
passwd -u root 2>/dev/null || true
# sshd 允许 root 密码登录（BCLinux 默认禁止）
mkdir -p /etc/ssh/sshd_config.d
cat > /etc/ssh/sshd_config.d/00-vdi-root-login.conf <<'SSHD'
PermitRootLogin yes
PasswordAuthentication yes
SSHD
systemctl enable sshd 2>/dev/null || ln -sf /usr/lib/systemd/system/sshd.service /etc/systemd/system/multi-user.target.wants/sshd.service
%end
