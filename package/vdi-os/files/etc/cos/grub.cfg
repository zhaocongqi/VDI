set timeout=3
set default=0
set fallback=0

set state_label=COS_STATE
set recovery_label=COS_RECOVERY
set oem_label=COS_OEM
set persistent_label=COS_PERSISTENT
set third_party_kernel_args=""

set kernel=/boot/vmlinuz
set initramfs=/boot/initrd

set console_params="console=tty1 selinux=0"

if [ "${grub_cpu}" = "x86_64" -o "${grub_cpu}" = "i386" ];then
    if [ "${grub_platform}" = "efi" ]; then
        set linux=linuxefi
        set initrd=initrdefi
    else
        set linux=linux
        set initrd=initrd
    fi
fi

menuentry "VDI" --class os --unrestricted {
    search --no-floppy --set=root --label $state_label
    set img=/cOS/active.img
    set kernelcmd="$console_params root=LABEL=$state_label cos-img/filename=$img panic=0 net.ifnames=1 rd.cos.oemlabel=$oem_label rd.cos.mount=LABEL=$oem_label:/oem rd.cos.mount=LABEL=$persistent_label:/usr/local rd.cos.oemtimeout=120 $third_party_kernel_args"
    $linux ($root)$kernel $kernelcmd
    $initrd ($root)$initramfs
}

menuentry "VDI (recovery mode)" --class os --unrestricted {
    search --no-floppy --set=root --label $recovery_label
    set img=/cOS/recovery.img
    set kernelcmd="$console_params root=LABEL=$recovery_label cos-img/filename=$img rd.neednet=1 rd.cos.oemlabel=$oem_label rd.cos.mount=LABEL=$oem_label:/oem rd.cos.oemtimeout=120"
    $linux ($root)$kernel $kernelcmd
    $initrd ($root)$initramfs
}
