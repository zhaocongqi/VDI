set timeout=3
set default=0
set fallback=0

source /etc/cos/bootargs.cfg

if [ "${grub_cpu}" = "x86_64" -o "${grub_cpu}" = "i386" ];then
    if [ "${grub_platform}" = "efi" ]; then
        set linux=linuxefi
        set initrd=initrdefi
    else
        set linux=linux
        set initrd=initrd
    fi
fi

menuentry "VDI" --class os --unrestricted {
    $linux ($root)$kernel $kernelcmd
    $initrd ($root)$initramfs
}

menuentry "VDI (recovery mode)" --class os --unrestricted {
    set img=/cOS/recovery.img
    source /etc/cos/bootargs.cfg
    $linux ($root)$kernel $kernelcmd
    $initrd ($root)$initramfs
}
