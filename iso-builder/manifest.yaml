# VDI 离线资源清单
# 此文件是所有离线资源的唯一真相来源 (Single Source of Truth)
# 版本变更只需修改此文件，下载脚本和部署脚本都从中读取

name: vdi-offline-pack
version: "1.0.0"
buildDate: "2026-06-08"

components:
  kubernetes:
    version: "v1.34.3"
    images:
      - registry.k8s.io/kube-apiserver:v1.34.3
      - registry.k8s.io/kube-controller-manager:v1.34.3
      - registry.k8s.io/kube-scheduler:v1.34.3
      - registry.k8s.io/kube-proxy:v1.34.3
      - registry.k8s.io/etcd:3.5.21-0
      - registry.k8s.io/coredns/coredns:v1.12.1
      - registry.k8s.io/pause:3.10
    binaries:
      - name: kk
        version: "v4.0.4"
        url: "https://github.com/kubesphere/kubekey/releases/download/v4.0.4/kubekey-v4.0.4-linux-amd64.tar.gz"
      - name: kubectl
        version: "v1.34.3"
        url: "https://github.com/kubernetes/kubernetes/releases/download/v1.34.3/bin/linux/amd64/kubectl"
      - name: helm
        version: "v3.18.5"
        url: "https://get.helm.sh/helm-v3.18.5-linux-amd64.tar.gz"
      - name: virtctl
        version: "v1.5.0"
        url: "https://github.com/kubevirt/kubevirt/releases/download/v1.5.0/virtctl-v1.5.0-linux-amd64"

  kube-vip:
    version: "v0.7.2"
    images:
      - ghcr.io/kube-vip/kube-vip:v0.7.2

  kube-ovn:
    version: "v1.17.0"
    images:
      - docker.io/kubeovn/kube-ovn:v1.17.0
      - docker.io/kubeovn/vpc-nat-gateway:v1.17.0
    charts:
      - name: kube-ovn
        path: charts/kube-ovn/
        source: local  # 来自 deploy/kube-ovn/chart/

  longhorn:
    version: "v1.8.1"
    images:
      - longhornio/longhorn-manager:v1.8.1
      - longhornio/longhorn-engine:v1.8.1
      - longhornio/longhorn-ui:v1.8.1
      - longhornio/longhorn-instance-manager:v1.8.1
      - longhornio/support-bundle-kit:v0.0.52
      - longhornio/csi-attacher:v4.8.0
      - longhornio/csi-provisioner:v5.2.0
      - longhornio/csi-resizer:v1.13.1
      - longhornio/csi-snapshotter:v8.2.0
      - longhornio/livenessprobe:v2.15.0
      - longhornio/csi-node-driver-registrar:v2.13.0
    charts:
      - name: longhorn
        path: charts/longhorn/
        source: remote  # helm pull from charts.longhorn.io

  kubevirt:
    version: "v1.5.0"
    images:
      - quay.io/kubevirt/virt-operator:v1.5.0
      - quay.io/kubevirt/virt-api:v1.5.0
      - quay.io/kubevirt/virt-controller:v1.5.0
      - quay.io/kubevirt/virt-handler:v1.5.0
      - quay.io/kubevirt/virt-launcher:v1.5.0
    manifests:
      - name: kubevirt-operator
        path: k8s-manifests/kubevirt-operator.yaml
        url: "https://github.com/kubevirt/kubevirt/releases/download/v1.5.0/kubevirt-operator.yaml"
      - name: kubevirt-cr
        path: k8s-manifests/kubevirt-cr.yaml
        url: "https://github.com/kubevirt/kubevirt/releases/download/v1.5.0/kubevirt-cr.yaml"

  cdi:
    version: "v1.61.0"
    images:
      - quay.io/kubevirt/cdi-operator:v1.61.0
      - quay.io/kubevirt/cdi-controller:v1.61.0
      - quay.io/kubevirt/cdi-importer:v1.61.0
      - quay.io/kubevirt/cdi-cloner:v1.61.0
      - quay.io/kubevirt/cdi-apiserver:v1.61.0
      - quay.io/kubevirt/cdi-uploadproxy:v1.61.0
      - quay.io/kubevirt/cdi-uploadserver:v1.61.0
    manifests:
      - name: cdi-operator
        path: k8s-manifests/cdi-operator.yaml
        url: "https://github.com/kubevirt/containerized-data-importer/releases/download/v1.61.0/cdi-operator.yaml"
      - name: cdi-cr
        path: k8s-manifests/cdi-cr.yaml
        url: "https://github.com/kubevirt/containerized-data-importer/releases/download/v1.61.0/cdi-cr.yaml"

  kagent:
    version: "0.9.6"
    images:
      - ghcr.io/kagent-dev/kagent/controller:0.9.6
      - ghcr.io/kagent-dev/kagent/ui:0.9.6
      - docker.io/library/postgres:18.3-alpine
    charts:
      - name: kagent
        path: charts/kagent/
        source: oci  # oci://ghcr.io/kagent-dev/charts/kagent

packages:
  deb:
    - open-iscsi
    - nfs-common
    - conntrack
    - socat
    - ipvsadm
    - ebtables
    - ethtool
    - iptables
    - jq
    - curl
    - skopeo
    - chrony
