# Ubuntu 22.04 Preseed 自动安装配置
# 用于 TUI 模式 1（全新安装）和 PXE Worker 自动安装
# 此文件由构建系统提供模板，部署时由 TUI 动态生成实际值

# 本地化
d-i debian-installer/locale string zh_CN.UTF-8
d-i keyboard-configuration/layoutcode string cn
d-i keyboard-configuration/variantcode string ""

# 网络配置（由 TUI/preseed 动态覆盖）
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string vdi-node
d-i netcfg/get_domain string

# 镜像源（离线模式使用本地缓存，此处仅为 debootstrap 兼容）
d-i mirror/country string manual
d-i mirror/http/hostname string archive.ubuntu.com
d-i mirror/http/directory string /ubuntu
d-i mirror/http/proxy string

# 用户配置
d-i passwd/root-login boolean true
d-i passwd/root-password password vdi
d-i passwd/root-password-again password vdi
d-i passwd/user-fullname string VDI Admin
d-i passwd/username string vdi
d-i passwd/user-password password vdi
d-i passwd/user-password-again password vdi
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# 时区
d-i time/zone string Asia/Shanghai
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string ntp.aliyun.com

# 分区（自动使用整个磁盘）
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# GRUB
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# 软件包（最小化安装）
d-i pkgsel/include string openssh-server python3 whiptail curl wget jq chrony
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none

# 完成安装
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true

# 安装完成后执行脚本（路径由 PXE/TUI 动态生成）
# d-i preseed/late_command string in-target /tmp/postinstall.sh
