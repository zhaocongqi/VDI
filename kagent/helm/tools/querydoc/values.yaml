replicas: 1

image:
  registry: ghcr.io
  repository: kagent-dev/doc2vec/mcp
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 14000
  runAsGroup: 14000

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

logLevel: info

# MCP server configuration
config:

# Secret configuration
openai:
  apiKey: ""
  # secretRef: ""  # Name of existing Secret containing OPENAI_API_KEY. Takes precedence over apiKey.

# OTEL configuration
otel:
  tracing:
    enabled: false
    exporter:
      otlp:
        endpoint: ""
        timeout: 10000
        insecure: true
