suite: test querydoc deployment
templates:
  - deployment.yaml
  - configmap.yaml
  - secret.yaml
tests:
  - it: should render deployment with default values
    template: deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-querydoc
      - equal:
          path: spec.replicas
          value: 1
      - hasDocuments:
          count: 1

  - it: should render deployment with custom replica count
    template: deployment.yaml
    set:
      replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should have correct container image
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: querydoc
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/kagent-dev/doc2vec/mcp:1.1.10

  - it: should use custom image tag when set
    template: deployment.yaml
    set:
      image:
        tag: "v2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/kagent-dev/doc2vec/mcp:v2.0.0

  - it: should have correct service account name
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-querydoc

  - it: should have correct container port
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should have correct labels
    template: deployment.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: querydoc
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: querydoc
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should apply default pod security context
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should apply default container security context
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 14000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 14000
      - isNull:
          path: spec.template.spec.containers[0].securityContext.seccompProfile

  - it: should allow pod security context override
    template: deployment.yaml
    set:
      podSecurityContext:
        runAsNonRoot: true
        fsGroup: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should allow container security context override
    template: deployment.yaml
    set:
      securityContext:
        readOnlyRootFilesystem: false
        runAsUser: 1000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000

  - it: should set nodeSelector
    template: deployment.yaml
    set:
      nodeSelector:
        role: AI
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            role: AI

  - it: should set tolerations
    template: deployment.yaml
    set:
      tolerations:
        - key: role
          operator: Equal
          value: AI
          effect: NoSchedule
    asserts:
      - contains:
          any: true
          path: spec.template.spec.tolerations
          content:
            key: role
            value: AI
            effect: NoSchedule
            operator: Equal

  - it: should not include secretRef by default
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom
          value:
            - configMapRef:
                name: RELEASE-NAME-querydoc
      - notExists:
          path: spec.template.metadata.annotations.checksum/secret

  - it: should reference chart-owned Secret when only openai.apiKey is set
    template: deployment.yaml
    set:
      openai:
        apiKey: foo
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-querydoc
      - exists:
          path: spec.template.metadata.annotations.checksum/secret

  - it: should reference external Secret when openai.secretRef is set
    template: deployment.yaml
    set:
      openai:
        secretRef: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-secret
      - notExists:
          path: spec.template.metadata.annotations.checksum/secret

  - it: secretRef should win over apiKey when both are set
    template: deployment.yaml
    set:
      openai:
        apiKey: foo
        secretRef: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-secret
      - notExists:
          path: spec.template.metadata.annotations.checksum/secret
