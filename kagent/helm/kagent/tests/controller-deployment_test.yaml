suite: test controller deployment
templates:
  - controller-deployment.yaml
  - controller-configmap.yaml
  - postgresql-secret.yaml
tests:
  - it: should render controller deployment with default values
    template: controller-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-controller
      - equal:
          path: spec.replicas
          value: 1
      - hasDocuments:
          count: 1

  - it: should render the controller deployment with custom replica count
    template: controller-deployment.yaml
    set:
      controller:
        replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should have correct controller container image
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: controller
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^cr\\.kagent\\.dev/kagent-dev/kagent/controller:.+"

  - it: should use global tag when set
    template: controller-deployment.yaml
    set:
      tag: "v1.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: cr.kagent.dev/kagent-dev/kagent/controller:v1.0.0

  - it: should have correct controller resources
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 2
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  - it: should have correct service account name
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-controller

  - it: should have correct container port
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8083

  - it: should set A2A_BASE_URL with computed default value
    template: controller-configmap.yaml
    asserts:
      - equal:
          path: data.A2A_BASE_URL
          value: "http://RELEASE-NAME-controller.NAMESPACE.svc.cluster.local:8083"

  - it: should set A2A_BASE_URL with custom value when explicitly set
    template: controller-configmap.yaml
    set:
      controller:
        a2aBaseUrl: "https://kagent.example.com"
    asserts:
      - equal:
          path: data.A2A_BASE_URL
          value: "https://kagent.example.com"

  - it: should set PROXY_URL when set
    template: controller-configmap.yaml
    set:
      proxy:
        url: "http://proxy.kagent.svc.cluster.local:8080"
    asserts:
      - equal:
          path: data.PROXY_URL
          value: "http://proxy.kagent.svc.cluster.local:8080"

  - it: should not set PROXY_URL when not set
    template: controller-configmap.yaml
    asserts:
      - notExists:
          path: data.PROXY_URL

  - it: should use custom loglevel when set
    template: controller-configmap.yaml
    set:
      controller:
        loglevel: "debug"
    asserts:
      - equal:
          path: data.ZAP_LOG_LEVEL
          value: "debug"
  - it: should use controller.agentImage.pullSecret when set
    template: controller-configmap.yaml
    set:
      controller:
        agentImage:
          pullSecret: "pull-secret"
    asserts:
      - equal:
          path: data.IMAGE_PULL_SECRET
          value: "pull-secret"
  - it: should not use controller.agentImage.pullSecret when not set
    template: controller-configmap.yaml
    set:
      controller:
        agentImage:
          pullSecret: ""
    asserts:
      - notExists:
          path: data.IMAGE_PULL_SECRET

  - it: should set DEFAULT_AGENT_POD_LABELS when podLabels are configured
    template: controller-configmap.yaml
    set:
      controller:
        agentDeployment:
          podLabels:
            team: platform
            env: prod
    asserts:
      - equal:
          path: data.DEFAULT_AGENT_POD_LABELS
          value: "env=prod,team=platform"

  - it: should not set DEFAULT_AGENT_POD_LABELS when podLabels are empty
    template: controller-configmap.yaml
    set:
      controller:
        agentDeployment:
          podLabels: {}
    asserts:
      - notExists:
          path: data.DEFAULT_AGENT_POD_LABELS

  - it: should not set DEFAULT_AGENT_POD_LABELS when podLabels are not configured
    template: controller-configmap.yaml
    asserts:
      - notExists:
          path: data.DEFAULT_AGENT_POD_LABELS

  - it: should set DEFAULT_AGENT_POD_LABELS with single label
    template: controller-configmap.yaml
    set:
      controller:
        agentDeployment:
          podLabels:
            team: platform
    asserts:
      - equal:
          path: data.DEFAULT_AGENT_POD_LABELS
          value: "team=platform"

  - it: should set DEFAULT_AGENT_BIND_HOST when host is configured
    template: controller-configmap.yaml
    set:
      controller:
        agentDeployment:
          host: "::"
    asserts:
      - equal:
          path: data.DEFAULT_AGENT_BIND_HOST
          value: "::"

  - it: should not set DEFAULT_AGENT_BIND_HOST when host is empty
    template: controller-configmap.yaml
    set:
      controller:
        agentDeployment:
          host: ""
    asserts:
      - notExists:
          path: data.DEFAULT_AGENT_BIND_HOST

  - it: should not set DEFAULT_AGENT_BIND_HOST when host is not configured
    template: controller-configmap.yaml
    asserts:
      - notExists:
          path: data.DEFAULT_AGENT_BIND_HOST

  - it: should set DEFAULT_AGENT_BIND_HOST to dual-stack when ipv6 is enabled
    template: controller-configmap.yaml
    set:
      ipv6:
        enabled: true
    asserts:
      - equal:
          path: data.DEFAULT_AGENT_BIND_HOST
          value: "::"

  - it: should prefer explicit host over ipv6 flag
    template: controller-configmap.yaml
    set:
      ipv6:
        enabled: true
      controller:
        agentDeployment:
          host: "0.0.0.0"
    asserts:
      - equal:
          path: data.DEFAULT_AGENT_BIND_HOST
          value: "0.0.0.0"

  - it: should configure watch namespaces
    template: controller-configmap.yaml
    set:
      controller:
        watchNamespaces:
          - namespace-1
          - namespace-2
    asserts:
      - equal:
          path: data.WATCH_NAMESPACES
          value: "namespace-1,namespace-2"

  - it: should derive watch namespaces from rbac.namespaces when controller.watchNamespaces is unset
    template: controller-configmap.yaml
    set:
      rbac:
        namespaces:
          - NAMESPACE
          - ns2
    asserts:
      - equal:
          path: data.WATCH_NAMESPACES
          value: "NAMESPACE,ns2"

  - it: controller.watchNamespaces should override rbac.namespaces for WATCH_NAMESPACES
    template: controller-configmap.yaml
    set:
      controller:
        watchNamespaces:
          - explicit-ns
      rbac:
        namespaces:
          - NAMESPACE
    asserts:
      - equal:
          path: data.WATCH_NAMESPACES
          value: "explicit-ns"

  - it: should set podAnnotations
    template: controller-deployment.yaml
    set:
      controller:
        podAnnotations:
          role: AI
    asserts:
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            role: AI

  - it: should fallback to top-level podAnnotations
    template: controller-deployment.yaml
    set:
      podAnnotations:
        role: AI
    asserts:
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            role: AI

  - it: should set nodeSelector
    template: controller-deployment.yaml
    set:
      controller:
        nodeSelector:
          role: AI
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            role: AI

  - it: should set tolerations
    template: controller-deployment.yaml
    set:
      controller:
        tolerations:
          - key: role
            operator: Equal
            value: AI
            effect: NoSchedule
    asserts:
      - contains:
          any: true
          path: spec.template.spec.tolerations
          content:
            key: role
            value: AI
            effect: NoSchedule
            operator: Equal

  - it: should render extra volumes and mounts when provided
    template: controller-deployment.yaml
    set:
      controller:
        volumes:
          - name: extra-data
            emptyDir: {}
        volumeMounts:
          - name: extra-data
            mountPath: /extra
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-data
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-data
            mountPath: /extra

  - it: should not render volumes or volumeMounts sections when none are configured
    template: controller-deployment.yaml
    asserts:
      - isNull:
          path: spec.template.spec.volumes
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts

  # =============================================================================
  # Database Configuration Tests
  # =============================================================================

  - it: should set POSTGRES_PASSWORD from secret and POSTGRES_DATABASE_URL with bundled connection string by default
    template: controller-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-postgresql
                key: POSTGRES_PASSWORD
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DATABASE_URL
            value: "postgres://kagent:$(POSTGRES_PASSWORD)@RELEASE-NAME-postgresql.NAMESPACE.svc.cluster.local:5432/kagent?sslmode=disable"

  - it: should set POSTGRES_DATABASE_URL with external url when url is set
    template: controller-deployment.yaml
    set:
      database:
        postgres:
          url: "postgres://user:pass@external-host:5432/db"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DATABASE_URL
            value: "postgres://user:pass@external-host:5432/db"

  - it: should set POSTGRES_DATABASE_URL_FILE and omit POSTGRES_PASSWORD when urlFile is set
    template: controller-deployment.yaml
    set:
      database:
        postgres:
          urlFile: "/var/secrets/db-url"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DATABASE_URL_FILE
            value: "/var/secrets/db-url"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD

  - it: should set DATABASE_VECTOR_ENABLED to false by default
    template: controller-configmap.yaml
    asserts:
      - equal:
          path: data.DATABASE_VECTOR_ENABLED
          value: "false"

  - it: should set DATABASE_VECTOR_ENABLED to true when enabled
    template: controller-configmap.yaml
    set:
      database:
        postgres:
          vectorEnabled: true
    asserts:
      - equal:
          path: data.DATABASE_VECTOR_ENABLED
          value: "true"

  - it: should not set POSTGRES_DATABASE_URL in configmap
    template: controller-configmap.yaml
    asserts:
      - notExists:
          path: data.POSTGRES_DATABASE_URL

  - it: should not set POSTGRES_PASSWORD when url is set and bundled is enabled
    template: controller-deployment.yaml
    set:
      database:
        postgres:
          url: "postgres://user:pass@external-host:5432/db"
          bundled:
            enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD

  - it: should not set POSTGRES_PASSWORD when url is set and bundled is disabled
    template: controller-deployment.yaml
    set:
      database:
        postgres:
          url: "postgres://user:pass@external-host:5432/db"
          bundled:
            enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD

  - it: should set POSTGRES_DATABASE_URL_FILE and omit POSTGRES_PASSWORD when urlFile and bundled are both enabled
    template: controller-deployment.yaml
    set:
      database:
        postgres:
          urlFile: "/var/secrets/db-url"
          bundled:
            enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DATABASE_URL_FILE
            value: "/var/secrets/db-url"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DATABASE_URL

  - it: should set external POSTGRES_DATABASE_URL and omit POSTGRES_PASSWORD when url and bundled are both enabled
    template: controller-deployment.yaml
    set:
      database:
        postgres:
          url: "postgres://user:pass@external-host:5432/db"
          bundled:
            enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DATABASE_URL
            value: "postgres://user:pass@external-host:5432/db"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD

  - it: should use default httpGet startup probe
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 15
      - equal:
          path: spec.template.spec.containers[0].startupProbe.initialDelaySeconds
          value: 15

  - it: should use default httpGet readiness probe
    template: controller-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 30

  - it: should allow overriding startup probe
    template: controller-deployment.yaml
    set:
      controller:
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 20
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].startupProbe.initialDelaySeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].startupProbe.timeoutSeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 20

  - it: should allow overriding readiness probe
    template: controller-deployment.yaml
    set:
      controller:
        readinessProbe:
          exec:
            command: ["wget", "-q", "-O-", "http://localhost:8083/health"]
          periodSeconds: 60
          timeoutSeconds: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.exec.command
          value: ["wget", "-q", "-O-", "http://localhost:8083/health"]
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 60
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe.httpGet
