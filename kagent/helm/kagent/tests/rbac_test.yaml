suite: test rbac
templates:
  - controller-serviceaccount.yaml
  - ui-serviceaccount.yaml
  - rbac/getter-role.yaml
  - rbac/writer-role.yaml
  - rbac/getter-rolebinding.yaml
  - rbac/writer-rolebinding.yaml
tests:
  - it: should render controller serviceaccount
    template: controller-serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-controller
      - hasDocuments:
          count: 1

  - it: should render ui serviceaccount
    template: ui-serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ui
      - hasDocuments:
          count: 1

  - it: should render clusterroles by default
    asserts:
      - isKind:
          of: ClusterRole
        template: rbac/getter-role.yaml
      - isKind:
          of: ClusterRole
        template: rbac/writer-role.yaml

  - it: should have correct clusterrole names
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-getter-role
        template: rbac/getter-role.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-writer-role
        template: rbac/writer-role.yaml

  - it: should render clusterrolebindings by default
    asserts:
      - isKind:
          of: ClusterRoleBinding
        template: rbac/getter-rolebinding.yaml
      - isKind:
          of: ClusterRoleBinding
        template: rbac/writer-rolebinding.yaml

  - it: clusterrolebinding should reference correct serviceaccount
    template: rbac/getter-rolebinding.yaml
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-controller
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE

  - it: clusterrolebindings should reference correct clusterroles
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
        template: rbac/getter-rolebinding.yaml
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-getter-role
        template: rbac/getter-rolebinding.yaml
      - equal:
          path: roleRef.kind
          value: ClusterRole
        template: rbac/writer-rolebinding.yaml
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-writer-role
        template: rbac/writer-rolebinding.yaml

  - it: getter role should have read permissions
    template: rbac/getter-role.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["*"]
            verbs: ["get", "list", "watch"]

  - it: writer role should have write permissions
    template: rbac/writer-role.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["*"]
            verbs: ["create", "update", "patch", "delete"]

  - it: should use custom namespace when overridden
    set:
      namespaceOverride: "custom-namespace"
    templates:
      - controller-serviceaccount.yaml
      - ui-serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should have correct labels on all resources
    templates:
      - controller-serviceaccount.yaml
      - ui-serviceaccount.yaml
      - rbac/getter-role.yaml
      - rbac/writer-role.yaml
      - rbac/getter-rolebinding.yaml
      - rbac/writer-rolebinding.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: kagent
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should render Roles when rbac.namespaces is set
    set:
      rbac.namespaces:
        - NAMESPACE
    asserts:
      - isKind:
          of: Role
        template: rbac/getter-role.yaml
      - isKind:
          of: Role
        template: rbac/writer-role.yaml

  - it: should render RoleBindings when rbac.namespaces is set
    set:
      rbac.namespaces:
        - NAMESPACE
    asserts:
      - isKind:
          of: RoleBinding
        template: rbac/getter-rolebinding.yaml
      - isKind:
          of: RoleBinding
        template: rbac/writer-rolebinding.yaml

  - it: should render a single role/binding in the listed namespace only (no release-ns fallback)
    set:
      rbac.namespaces:
        - NAMESPACE
    asserts:
      - hasDocuments:
          count: 1
        template: rbac/getter-role.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/getter-role.yaml
      - hasDocuments:
          count: 1
        template: rbac/writer-rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/writer-rolebinding.yaml

  - it: should render multiple roles and bindings when namespaces are specified
    set:
      rbac.namespaces:
        - NAMESPACE
        - ns2
    asserts:
      - hasDocuments:
          count: 2
        template: rbac/getter-role.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/getter-role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: ns2
        template: rbac/getter-role.yaml
        documentIndex: 1
      - hasDocuments:
          count: 2
        template: rbac/getter-rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/getter-rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: ns2
        template: rbac/getter-rolebinding.yaml
        documentIndex: 1

  - it: should fail rendering if the removed rbac.clusterScoped field is set
    set:
      rbac.clusterScoped: false
    template: rbac/writer-rolebinding.yaml
    asserts:
      - failedTemplate:
          errorMessage: "rbac.clusterScoped has been removed. Leave rbac.namespaces empty for cluster-scoped RBAC, or set rbac.namespaces=[<ns>, ...] for namespaced RBAC."

  - it: should fail rendering if rbac.namespaces is set but does not include the install namespace
    set:
      rbac.namespaces:
        - some-other-ns
    template: rbac/writer-rolebinding.yaml
    asserts:
      - failedTemplate:
          errorMessage: "rbac.namespaces is set but does not include the install namespace \"NAMESPACE\""

  - it: should accept a custom install namespace when listed in rbac.namespaces
    set:
      namespaceOverride: my-ns
      rbac.namespaces:
        - my-ns
        - other-ns
    template: rbac/getter-role.yaml
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.namespace
          value: my-ns
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: other-ns
        documentIndex: 1