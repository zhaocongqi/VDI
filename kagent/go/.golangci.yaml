version: "2"
run:
  go: "1.26"
  timeout: 10m
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - copyloopvar
    - depguard
    - dogsled
    - goprintffuncname
    - govet
    - importas
    - ineffassign
    - iotamixing
    - kubeapilinter
    - makezero
    - misspell
    - modernize
    - nakedret
    - nolintlint
    - staticcheck
    - unused
    - whitespace
  settings:
    custom:
      kubeapilinter:
        path: "bin/kube-api-linter.so"
        description: Kube API Linter lints Kube like APIs based on API conventions and best practices.
        original-url: sigs.k8s.io/kube-api-linter
        settings:
          linters:
            enable:
              - "conflictingmarkers"
              - "duplicatemarkers"
              - "nofloats"
              - "optionalorrequired"
              - "statussubresource"
              - "uniquemarkers"
              - "statusoptional"
              - "nophase"
              - "nonullable"
              - "forbiddenmarkers"
              - "nomaps"
            disable:
              - "*"
          lintersConfig:
            conflictingmarkers:
              conflicts:
              - name: "default_vs_required"
                sets:
                  - ["default", "kubebuilder:default"]
                  - ["required", "kubebuilder:validation:Required", "k8s:required"]
                description: "A field with a default value cannot be required"
            forbiddenmarkers:
              markers:
                - identifier: "+kubebuilder:pruning:PreserveUnknownFields"
                - identifier: "+kubebuilder:validation:XPreserveUnknownFields"
                - identifier: "+kubebuilder:validation:items:XPreserveUnknownFields"
                - identifier: "+kubebuilder:validation:EmbeddedResource"
                - identifier: "+kubebuilder:validation:XEmbeddedResource"
                - identifier: "+kubebuilder:validation:items:XEmbeddedResource"
    depguard:
      rules:
        forbid-pkg-errors:
          deny:
            - pkg: sort
              desc: Should be replaced with slices package
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    importas:
      alias:
        - pkg: k8s.io/api/core/v1
          alias: corev1
        - pkg: k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1
          alias: apiextensionsv1
        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1
        - pkg: k8s.io/apimachinery/pkg/api/errors
          alias: apierrors
        - pkg: k8s.io/apimachinery/pkg/util/errors
          alias: kerrors
      no-unaliased: true
    modernize:
      disable:
        - omitzero
        - fmtappendf
    revive:
      rules:
        # The following rules are recommended https://github.com/mgechev/revive#recommended-configuration
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        #
        # Rules in addition to the recommended configuration above.
        #
        - name: bool-literal-in-expr
        - name: constant-logical-expr
  exclusions:
    generated: strict
    paths:
      - zz_generated.*\.go$
      - .*conversion.*\.go$
    rules:
      - linters:
          - kubeapilinter
        path-except: "api/v1alpha"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: strict
    paths:
      - zz_generated.*\.go$
      - .*conversion.*\.go$
