[tool.uv.workspace]
members = ["packages/*", "samples/adk/*", "samples/langgraph/*", "samples/crewai/*", "samples/openai/*"]

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=0.25.3",
  "ruff>=0.15.13",
  "authlib>=1.7.2"
]

[tool.uv]
constraint-dependencies = [
    "aiohttp>=3.13.5",
    "cryptography>=48.0.0",
    "jaraco-context>=6.1.0",
    "mako>=1.3.12",
    "pyasn1>=0.6.3",
    "pyopenssl>=26.0.0",
    "python-dotenv>=1.2.2",
    "requests>=2.34.2",
    "sqlparse>=0.5.5",
    "wheel>=0.46.2",
]

[tool.uv.sources]
kagent-adk = { workspace = true }
agentsts-adk = { workspace = true }
agentsts-core = { workspace = true }

[tool.ruff]
line-length = 120
fix = true
exclude = [
  "notebooks/",
]

target-version = "py310"

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
select = ["E", "F", "W", "B", "Q", "I", "ASYNC", "T20"]
ignore = ["F401", "E501", "B008", "ASYNC109"]

[tool.setuptools.packages.find]
where = ["packages"]

[tool.setuptools.package-data]
"*" = ["*.json", "*.yaml", "*.yml", "*.txt", "*.md"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
python_files = "test_*.py"
python_functions = "test_*"
log_cli = true
log_cli_level = "INFO"
testpaths = ["tests", "packages/*/tests"]
