version: 2

updates:
  # GitHub Actions — keep CI workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    reviewers:
      - "EItanya"
      - "peterj"
      - "ilackarms"
      - "yuval-k"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Go modules
  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    reviewers:
      - "EItanya"
      - "ilackarms"
      - "yuval-k"
    groups:
      go-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Python (uv) — single workspace root.
  # Dependabot's native `uv` ecosystem detects workspace members through
  # python/pyproject.toml's [tool.uv.workspace] section and updates the
  # root python/uv.lock alongside any member's pyproject.toml in the
  # same PR. Listing each member as its own directory caused Dependabot
  # to open per-member PRs that did not refresh the root lockfile,
  # which then failed `uv sync --locked` in CI.
  - package-ecosystem: "uv"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    reviewers:
      - "EItanya"
      - "peterj"
      - "yuval-k"
    groups:
      python-opentelemetry:
        applies-to: version-updates
        patterns:
          - "opentelemetry-*"
        update-types:
          - "minor"
          - "patch"
      python-google-ai:
        applies-to: version-updates
        patterns:
          - "google-adk"
          - "google-genai"
          - "google-auth"
        update-types:
          - "minor"
          - "patch"
      python-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # npm — Next.js UI
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    reviewers:
      - "peterj"
    ignore:
      # Suppress major UI dependency bumps (e.g., Next.js, React) until
      # the frontend is ready for those migrations. Minor/patch updates
      # still flow through via the npm-minor-patch group below.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker — core production images
  - package-ecosystem: "docker"
    directories:
      - "/go"
      - "/python"
      - "/ui"
      - "/docker/skills-init"
      - "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    reviewers:
      - "EItanya"
      - "peterj"
      - "ilackarms"
      - "yuval-k"
    groups:
      docker-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
