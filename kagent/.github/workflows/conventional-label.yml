name: Conventional Commit Labels

on:
  pull_request_target:
    types: [opened, edited]

jobs:
  label-by-title:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: bcoe/conventional-release-labels@v1
        with:
          type_labels: |
            {
              "feat": "enhancement",
              "fix": "bug",
              "docs": "documentation",
              "test": "testing"
            }
