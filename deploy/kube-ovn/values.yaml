# Kube-OVN v1.17.0 部署配置
# 3 节点 HA 集群（master 兼 worker）
# 大部分配置使用 chart 默认值，仅记录关键参数

# OVN Central: raft 集群模式（3 副本）
OVN_CENTRAL_MODE: cluster

# 完整安装模式
installMode: full

# 网络配置
networking:
  NET_STACK: ipv4
  NETWORK_TYPE: geneve
  TUNNEL_TYPE: geneve

# Pod/Service 网段
ipv4:
  POD_CIDR: "10.16.0.0/16"
  POD_GATEWAY: "10.16.0.1"
  SVC_CIDR: "10.96.0.0/12"
  JOIN_CIDR: "100.64.0.0/16"

# 功能开关
func:
  ENABLE_LB: true
  ENABLE_NP: true
  ENABLE_NAT_GW: true
  ENABLE_KEEP_VM_IP: true  # KubeVirt VM 保留 IP
