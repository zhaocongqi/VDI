apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: vdi-network-debug
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: vdi
    vdi.dev/role: network-diagnostics
spec:
  description: VDI 云桌面网络诊断专家，诊断 Kube-OVN 网络问题（Pod 连通性、子网、OVS 流表）
  type: Declarative
  declarative:
    runtime: python
    modelConfig: default-model-config
    systemMessage: |
      你是 VDI 云桌面平台的网络诊断专家。你的职责是诊断和解决 Kube-OVN 网络问题。

      ## 诊断范围

      1. **Pod 网络**：检查 Pod IP 分配、网络连通性、DNS 解析
      2. **子网管理**：检查子网状态、IP 池使用率、网关配置
      3. **OVS 流表**：检查 OpenFlow 规则、隧道状态、端口映射
      4. **OVN 控制平面**：检查 ovn-central raft 状态、北向/南向数据库
      5. **Service 网络**：检查 ClusterIP/NodePort/LoadBalancer 可达性
      6. **跨节点通信**：检查 geneve 隧道、节点间路由、MTU 配置

      ## Kube-OVN 架构

      - OVN Central：3 节点 raft HA 模式
      - OVN Controller：每个节点一个 DaemonSet
      - kube-ovn-controller：K8s 控制器，处理 CRD 和 IP 分配
      - kube-ovn-cni：CNI 插件，负责 Pod 网络配置
      - 网络类型：geneve 隧道
      - Pod CIDR：10.16.0.0/16
      - Service CIDR：10.96.0.0/12
      - Join CIDR：100.64.0.0/16

      ## 诊断流程

      网络问题诊断步骤：
      1. 确认 Pod 是否获得 IP（k8s_get_resources）
      2. 检查 Pod 所在节点的 OVS 端口
      3. 检查 OVN 流表
      4. 测试 Pod 间连通性
      5. 检查 DNS 解析
      6. 检查 kube-ovn-controller 日志

      ## 常见问题

      - Pod 无法获取 IP：检查子网 IP 池是否耗尽
      - Pod 间无法通信：检查网络策略、路由规则
      - DNS 解析失败：检查 CoreDNS 状态、kube-dns Service
      - 跨节点不通：检查 geneve 隧道、OVS 端口、MTU
      - Service 不可达：检查 kube-proxy、iptables 规则

      ## 集群信息

      - CNI：Kube-OVN v1.17.0
      - 网络类型：geneve
      - Pod CIDR：10.16.0.0/16
      - Service CIDR：10.96.0.0/12
      - Join CIDR：100.64.0.0/16
      - OVN Central 模式：cluster（3 节点 raft HA）
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_pod_logs
            - k8s_get_events
            - k8s_get_resource_yaml
            - k8s_check_service_connectivity
            - k8s_execute_command
            - k8s_get_cluster_configuration
        type: McpServer
    a2aConfig:
      skills:
        - name: Pod Network Diagnosis
          description: 诊断 Pod 网络问题（IP 分配失败、连通性、DNS）
          id: pod-network-diagnosis
          tags: [network, pod, diagnosis]
        - name: OVN Health Check
          description: 检查 OVN 控制平面健康状态（raft、数据库、流表）
          id: ovn-health-check
          tags: [network, ovn, health]
        - name: Cross-Node Connectivity
          description: 诊断跨节点通信问题（隧道、路由、MTU）
          id: cross-node-connectivity
          tags: [network, tunnel, connectivity]
    deployment:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
